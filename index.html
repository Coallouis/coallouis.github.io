<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h1 class="neon-text">Neon <span>Motion</span></h1>
        
        <div class="grid-wrapper">
            
            <div class="video-card large-span">
                <video autoplay muted loop playsinline>
                    <source src="https://drive.google.com/uc?export=download&id=1j4g3eE7uk4-PVoyZZqueyzrnADACqWRZ" type="video/mp4">
                    Browser kamu tidak mendukung tag video.
                </video>
                <div class="overlay">
                    <p>MAIN FEED: ACTIVE</p>
                </div>
            </div>

            <div class="video-card">
                <video autoplay muted loop playsinline>
                    <source src="https://i.imgur.com/vHq9P8N.mp4" type="video/mp4">
                </video>
                <div class="overlay"><p>SUB_01</p></div>
            </div>

            <div class="video-card">
                <video autoplay muted loop playsinline>
                    <source src="https://i.imgur.com/mO24vFw.mp4" type="video/mp4">
                </video>
                <div class="overlay"><p>SUB_02</p></div>
            </div>

        </div>
    </div>

</body>
</html>
