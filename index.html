<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Perang POV - Mobile + PC</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action: none; }
    canvas { display:block; }
    .hud {
      position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 18px;
      text-shadow: 0 0 8px black; pointer-events: none; z-index: 10;
    }
    .crosshair {
      position: absolute; top: 50%; left: 50%; color: lime; font-size: 30px;
      transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
      text-shadow: 0 0 10px lime;
    }
    #joystick {
      position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px;
      background: rgba(255,255,255,0.15); border-radius: 50%; border: 3px solid rgba(0,255,0,0.3);
      display: none; z-index: 20;
    }
    #fireBtn {
      position: absolute; bottom: 40px; right: 30px; width: 90px; height: 90px;
      background: rgba(255,0,0,0.6); border-radius: 50%; border: 4px solid #ff4444;
      color: white; font-size: 16px; display: flex; align-items:center; justify-content:center;
      z-index: 20; display: none;
    }
  </style>
</head>
<body>

  <canvas id="game"></canvas>
  
  <div class="hud">
    NYAWA: <span id="health">100</span> | 
    SKOR: <span id="score">0</span>
  </div>
  <div class="crosshair">+</div>

  <!-- Kontrol Mobile -->
  <div id="joystick"></div>
  <div id="fireBtn">Tembak</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let player = { health: 100, score: 0, angle: 0 };
    let bullets = [];
    let enemies = [];
    let particles = [];
    let gameOver = false;
    let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    // Kontrol
    let moveX = 0, moveY = 0;
    let shooting = false;
    let joystickActive = false;
    let joyCenter = {x:0, y:0};
    let joyTouchId = null;

    // Tampilkan kontrol mobile
    if (isMobile) {
      document.getElementById('joystick').style.display = 'block';
      document.getElementById('fireBtn').style.display = 'flex';
    }

    // ==================== MOUSE / TOUCH ====================
    canvas.addEventListener('mousemove', e => {
      if (!isMobile && document.pointerLockElement) {
        player.angle -= e.movementX * 0.2;
      }
    });

    // Touch controls
    const joystick = document.getElementById('joystick');
    const fireBtn = document.getElementById('fireBtn');

    canvas.addEventListener('touchstart', e => {
      for (let touch of e.touches) {
        if (touch.clientX > w/2) {
          shooting = true;
        } else if (!joystickActive) {
          joystickActive = true;
          joyCenter.x = touch.clientX;
          joyCenter.y = touch.clientY;
          joyTouchId = touch.identifier;
        }
      }
    });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      for (let touch of e.touches) {
        if (touch.identifier === joyTouchId && joystickActive) {
          const dx = touch.clientX - joyCenter.x;
          const dy = touch.clientY - joyCenter.y;
          const dist = Math.min(50, Math.sqrt(dx*dx + dy*dy));
          moveX = (dx / 50);
          moveY = (dy / 50);
        }
      }
    });

    canvas.addEventListener('touchend', e => {
      let stillShooting = false;
      for (let touch of e.touches) {
        if (touch.clientX > w/2) stillShooting = true;
      }
      shooting = stillShooting;

      if (e.touches.length === 0) {
        joystickActive = false;
        moveX = moveY = 0;
      }
    });

    fireBtn.addEventListener('touchstart', () => shooting = true);
    fireBtn.addEventListener('touchend', () => shooting = false);

    // Klik PC
    canvas.addEventListener('click', () => {
      if (!isMobile) shoot();
    });

    function shoot() {
      if (gameOver) return;
      bullets.push({life: 30});
      
      // Muzzle effect
      particles.push({life: 5, type: 'flash'});
      
      // Simple sound
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const o = audio.createOscillator();
        o.frequency.value = 150;
        o.connect(audio.destination);
        o.start();
        o.stop(audio.currentTime + 0.07);
      } catch(e){}
    }

    function spawnEnemy() {
      enemies.push({
        dist: 700 + Math.random() * 500,
        side: Math.random() * 160 - 80,
        health: 3
      });
    }

    function update() {
      if (gameOver) return;

      // Gerak angle (PC mouse sudah di atas)
      if (isMobile) {
        player.angle += moveX * 4; // putar pandangan dengan joystick kiri
      }

      // Tembak otomatis kalau tekan tombol
      if (shooting && Math.random() < 0.4) shoot();

      // Update bullets & enemies (sama seperti sebelumnya)
      for (let i = bullets.length-1; i>=0; i--) {
        if (--bullets[i].life <= 0) bullets.splice(i,1);
      }

      for (let i = enemies.length-1; i>=0; i--) {
        let e = enemies[i];
        e.dist -= 3;

        if (e.dist < 90) {
          player.health -= 22;
          enemies.splice(i,1);
          if (player.health <= 0) gameOver = true;
          continue;
        }

        // Hit detection
        for (let j = bullets.length-1; j>=0; j--) {
          if (Math.abs(e.side) < 50) {
            e.health--;
            bullets.splice(j,1);
            if (e.health <= 0) {
              player.score += 70;
              enemies.splice(i,1);
            }
            break;
          }
        }
      }

      if (Math.random() < 0.045) spawnEnemy();

      document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
      document.getElementById('score').textContent = player.score;
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0a1a2a';
      ctx.fillRect(0, 0, w, h/2);
      ctx.fillStyle = '#112200';
      ctx.fillRect(0, h/2, w, h/2);

      // Musuh
      for (let e of enemies) {
        let scale = 850 / e.dist;
        let x = w/2 + e.side * scale * 0.9;
        let sizeW = 90 * scale;
        let sizeH = 160 * scale;

        ctx.fillStyle = '#6b1e1e';
        ctx.fillRect(x - sizeW/2, h/2 - sizeH/2 + 30, sizeW, sizeH);
        ctx.fillStyle = '#3a1a1a';
        ctx.fillRect(x - sizeW/3, h/2 - sizeH/2 - 20, sizeW*0.65, 55);
      }

      // Senjata
      ctx.fillStyle = '#222';
      ctx.fillRect(w/2 - 35, h - 160, 70, 200);

      // Muzzle flash
      for (let p of particles) {
        if (p.type === 'flash' && p.life > 0) {
          ctx.fillStyle = `rgba(255,220,80,${p.life/5})`;
          ctx.fillRect(w/2 - 25, h - 190, 50, 70);
        }
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.9)';
        ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 55px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', w/2, h/2 - 30);
        ctx.fillStyle = '#fff';
        ctx.font = '28px Arial';
        ctx.fillText(`Skor: ${player.score}`, w/2, h/2 + 30);
        ctx.fillText('Refresh halaman untuk main lagi', w/2, h/2 + 80);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
