<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perang Tank - Game Perang</title>
  <style>
    body {
      margin: 0;
      background: #0f1b0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    canvas {
      border: 4px solid #4a7043;
      image-rendering: pixelated;
      margin: 20px auto;
      background: #1a3a1a;
    }
    h1 { margin: 10px; color: #ff4444; }
    .info {
      font-size: 20px;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1>⚔️ PERANG TANK ⚔️</h1>
  <div class="info">
    Nyawa: <span id="health">100</span> | 
    Skor: <span id="score">0</span> | 
    Level: <span id="level">1</span>
  </div>
  <canvas id="game" width="800" height="500"></canvas>
  <p>Gunakan <b>ARROW KEYS</b> atau <b>WASD</b> untuk gerak • <b>MOUSE</b> untuk tembak</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let player = { x: 100, y: 250, width: 40, height: 30, speed: 5, health: 100 };
    let bullets = [];
    let enemies = [];
    let particles = [];
    let score = 0;
    let level = 1;
    let keys = {};
    let mouse = { x: 400, y: 250 };
    let gameOver = false;

    // Kontrol keyboard
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Kontrol mouse
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    });

    canvas.addEventListener('click', () => {
      if (!gameOver) shoot();
    });

    function shoot() {
      const dx = mouse.x - (player.x + 30);
      const dy = mouse.y - (player.y + 15);
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      bullets.push({
        x: player.x + 30,
        y: player.y + 15,
        vx: (dx/dist) * 12,
        vy: (dy/dist) * 12,
        life: 60
      });
    }

    function spawnEnemy() {
      enemies.push({
        x: canvas.width + 50,
        y: Math.random() * (canvas.height - 60) + 30,
        width: 45,
        height: 35,
        speed: 2 + level * 0.5,
        health: 2 + Math.floor(level / 2)
      });
    }

    function createExplosion(x, y) {
      for (let i = 0; i < 15; i++) {
        particles.push({
          x, y,
          vx: Math.random() * 8 - 4,
          vy: Math.random() * 8 - 4,
          life: 30,
          color: Math.random() > 0.5 ? '#ff8800' : '#ffff00'
        });
      }
    }

    function update() {
      if (gameOver) return;

      // Gerak player
      if (keys['arrowleft'] || keys['a']) player.x -= player.speed;
      if (keys['arrowright'] || keys['d']) player.x += player.speed;
      if (keys['arrowup'] || keys['w']) player.y -= player.speed;
      if (keys['arrowdown'] || keys['s']) player.y += player.speed;

      // Batas layar
      player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
      player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        if (b.life <= 0 || b.x > canvas.width) bullets.splice(i, 1);
      }

      // Update enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.x -= e.speed;

        // Tabrakan dengan player
        if (e.x < player.x + player.width && 
            e.x + e.width > player.x &&
            e.y < player.y + player.height && 
            e.y + e.height > player.y) {
          player.health -= 20;
          createExplosion(e.x, e.y);
          enemies.splice(i, 1);
          if (player.health <= 0) gameOver = true;
          continue;
        }

        // Tabrakan dengan peluru
        for (let j = bullets.length - 1; j >= 0; j--) {
          let b = bullets[j];
          if (b.x > e.x && b.x < e.x + e.width && 
              b.y > e.y && b.y < e.y + e.height) {
            e.health--;
            bullets.splice(j, 1);
            if (e.health <= 0) {
              score += 10 * level;
              createExplosion(e.x + 20, e.y + 15);
              enemies.splice(i, 1);
            }
            break;
          }
        }
      }

      // Spawn musuh
      if (Math.random() < 0.02 + level * 0.005) spawnEnemy();

      // Level up
      if (score > level * 150) level++;

      document.getElementById('health').textContent = Math.max(0, player.health);
      document.getElementById('score').textContent = score;
      document.getElementById('level').textContent = level;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Background sederhana
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Gambar player tank
      ctx.fillStyle = '#00cc00';
      ctx.fillRect(player.x, player.y, player.width, player.height);
      ctx.fillStyle = '#008800';
      ctx.fillRect(player.x + 25, player.y + 5, 25, 20); // turret

      // Peluru
      ctx.fillStyle = '#ffff00';
      for (let b of bullets) {
        ctx.fillRect(b.x, b.y, 8, 4);
      }

      // Musuh tank
      ctx.fillStyle = '#cc0000';
      for (let e of enemies) {
        ctx.fillRect(e.x, e.y, e.width, e.height);
        ctx.fillStyle = '#880000';
        ctx.fillRect(e.x + 5, e.y + 8, 30, 18);
        ctx.fillStyle = '#cc0000';
      }

      // Partikel ledakan
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.globalAlpha = p.life / 30;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 6, 6);
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      ctx.globalAlpha = 1;

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff4444';
        ctx.font = '50px Arial';
        ctx.fillText('GAME OVER', 220, 230);
        ctx.font = '30px Arial';
        ctx.fillStyle = 'white';
        ctx.fillText(`Skor Akhir: ${score}`, 280, 280);
        ctx.fillText('Refresh halaman untuk main lagi', 200, 330);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Mulai game
    gameLoop();
  </script>
</body>
</html>
