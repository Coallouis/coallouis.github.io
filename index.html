<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Perang POV</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:none; }
    canvas { display:block; }
    .hud { 
      position:absolute; top:10px; left:10px; color:#0f0; font-size:20px; 
      text-shadow:0 0 8px black; z-index:10; 
    }
    .crosshair { 
      position:absolute; top:50%; left:50%; color:lime; font-size:35px; 
      transform:translate(-50%,-50%); pointer-events:none; z-index:5; 
    }
    .info {
      position:absolute; bottom:15px; width:100%; text-align:center; 
      color:#aaa; font-size:15px; z-index:10;
    }
    .left { position:absolute; left:0; top:0; width:50%; height:100%; z-index:5; }
    .right { position:absolute; right:0; top:0; width:50%; height:100%; z-index:5; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">NYAWA: <span id="health">100</span> | SKOR: <span id="score">0</span></div>
  <div class="crosshair">+</div>
  <div class="info">Klik KIRI = Putar Pandangan | Klik KANAN = Tembak</div>

  <div class="left" id="left"></div>
  <div class="right" id="right"></div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    });

    let player = { health: 100, score: 0, angle: 0 };
    let bullets = [];
    let enemies = [];
    let particles = [];
    let gameOver = false;

    const leftArea = document.getElementById('left');
    const rightArea = document.getElementById('right');

    let isTurningLeft = false;
    let isShooting = false;

    // Kontrol
    leftArea.addEventListener('mousedown', () => isTurningLeft = true);
    leftArea.addEventListener('mouseup', () => isTurningLeft = false);
    leftArea.addEventListener('touchstart', () => isTurningLeft = true);
    leftArea.addEventListener('touchend', () => isTurningLeft = false);

    rightArea.addEventListener('mousedown', () => isShooting = true);
    rightArea.addEventListener('mouseup', () => isShooting = false);
    rightArea.addEventListener('touchstart', () => isShooting = true);
    rightArea.addEventListener('touchend', () => isShooting = false);

    function shoot() {
      bullets.push({ life: 30, hit: false });
      particles.push({ life: 7, type: 'flash' });
    }

    function spawnEnemy() {
      enemies.push({
        dist: 800 + Math.random() * 500,
        side: Math.random() * 180 - 90,
        health: 3,
        maxHealth: 3
      });
    }

    function createExplosion(x, y, big = false) {
      for (let i = 0; i < (big ? 25 : 12); i++) {
        particles.push({
          x: x,
          y: y,
          life: big ? 25 : 18,
          type: 'explosion',
          size: big ? 18 : 10
        });
      }
    }

    function update() {
      if (gameOver) return;

      if (isTurningLeft) player.angle -= 4;

      // Tembak otomatis saat tekan kanan
      if (isShooting && Math.random() < 0.55) shoot();

      // Update peluru
      for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.life--;
        if (b.life <= 0) bullets.splice(i, 1);
      }

      // Update musuh + hit detection
      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.dist -= 3.8;

        // Musuh terlalu dekat
        if (e.dist < 130) {
          player.health -= 25;
          createExplosion(w/2, h/2, true);
          enemies.splice(i, 1);
          if (player.health <= 0) gameOver = true;
          continue;
        }

        // Cek apakah ada peluru yang mengenai musuh
        for (let j = bullets.length - 1; j >= 0; j--) {
          let b = bullets[j];
          if (!b.hit && Math.abs(e.side) < 70 && e.dist < 650) {
            e.health--;
            b.hit = true;
            bullets.splice(j, 1);

            // Efek kena
            createExplosion(w/2 + e.side * 0.8, h/2 - 60);

            if (e.health <= 0) {
              player.score += 100;
              createExplosion(w/2 + e.side * 0.8, h/2 - 60, true);
              enemies.splice(i, 1);
            }
            break;
          }
        }
      }

      // Spawn musuh baru
      if (Math.random() < 0.065) spawnEnemy();

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].life--;
        if (particles[i].life <= 0) particles.splice(i, 1);
      }

      document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
      document.getElementById('score').textContent = player.score;
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0a1a30';
      ctx.fillRect(0, 0, w, h/2);
      ctx.fillStyle = '#1f2a10';
      ctx.fillRect(0, h/2, w, h/2);

      // Gambar musuh
      for (let e of enemies) {
        let scale = 1050 / e.dist;
        let x = w/2 + e.side * scale * 0.85;
        let bodyH = 180 * scale;
        let bodyW = 95 * scale;

        // Badan
        ctx.fillStyle = '#6b1f1f';
        ctx.fillRect(x - bodyW/2, h/2 - bodyH/2 + 20, bodyW, bodyH);
        
        // Kepala
        ctx.fillStyle = '#3a1a1a';
        ctx.fillRect(x - bodyW*0.35, h/2 - bodyH/2 - 25, bodyW*0.7, bodyH*0.4);
      }

      // Senjata
      ctx.fillStyle = '#1c1c1c';
      ctx.fillRect(w/2 - 38, h - 165, 76, 230);

      // Muzzle Flash
      for (let p of particles) {
        if (p.type === 'flash' && p.life > 0) {
          ctx.fillStyle = `rgba(255, 230, 100, ${p.life/8})`;
          ctx.fillRect(w/2 - 32, h - 195, 64, 85);
        }
      }

      // Ledakan
      for (let p of particles) {
        if (p.type === 'explosion') {
          let alpha = p.life / 25;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#ff8800';
          ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        }
      }
      ctx.globalAlpha = 1;

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.95)';
        ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#ff2222';
        ctx.font = 'bold 70px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', w/2, h/2 - 30);
        ctx.fillStyle = '#ffffff';
        ctx.font = '30px Arial';
        ctx.fillText(`Skor Akhir: ${player.score}`, w/2, h/2 + 40);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // Spawn musuh pertama
    spawnEnemy();
    spawnEnemy();
    loop();
  </script>
</body>
</html>
