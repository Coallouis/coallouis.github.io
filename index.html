<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Perang POV - Mobile + PC</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action: none; }
    canvas { display:block; }
    .hud {
      position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 18px;
      text-shadow: 0 0 8px black; pointer-events: none; z-index: 10;
    }
    .crosshair {
      position: absolute; top: 50%; left: 50%; color: lime; font-size: 30px;
      transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
      text-shadow: 0 0 10px lime;
    }
    #joystick {
      position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px;
      background: rgba(255,255,255,0.15); border-radius: 50%; border: 3px solid rgba(0,255,0,0.3);
      display: none; z-index: 20;
    }
    #fireBtn {
      position: absolute; bottom: 40px; right: 30px; width: 90px; height: 90px;
      background: rgba(255,0,0,0.6); border-radius: 50%; border: 4px solid #ff4444;
      color: white; font-size: 16px; display: flex; align-items:center; justify-content:center;
      z-index: 20; display: none;
    }
  </style>
</head>
<body>

  <canvas id="game"></canvas>
  
  <div class="hud">
    NYAWA: <span id="health">100</span> | 
    SKOR: <span id="score">0</span>
  </div>
  <div class="crosshair">+</div>

  <!-- Kontrol Mobile -->
  <div id="joystick"></
