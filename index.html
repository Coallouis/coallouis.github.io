<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Perang POV</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:none; }
    canvas { display:block; }
    .hud { 
      position:absolute; top:10px; left:10px; color:#0f0; font-size:20px; 
      text-shadow:0 0 8px black; z-index:10; 
    }
    .crosshair { 
      position:absolute; top:50%; left:50%; color:lime; font-size:35px; 
      transform:translate(-50%,-50%); pointer-events:none; z-index:5; 
    }
    .info {
      position:absolute; bottom:15px; width:100%; text-align:center; 
      color:#aaa; font-size:15px; z-index:10;
    }
    .left { position:absolute; left:0; top:0; width:50%; height:100%; z-index:5; }
    .right { position:absolute; right:0; top:0; width:50%; height:100%; z-index:5; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">NYAWA: <span id="health">100</span> | SKOR: <span id="score">0</span></div>
  <div class="crosshair">+</div>
  <div class="info">Klik KIRI Layar = Putar | Klik KANAN Layar = Tembak</div>

  <!-- Area klik -->
  <div class="left" id="left"></div>
  <div class="right" id="right"></div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    
    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    });

    let player = { health: 100, score: 0, angle: 0 };
    let bullets = [];
    let enemies = [];
    let particles = [];
    let gameOver = false;

    const leftArea = document.getElementById('left');
    const rightArea = document.getElementById('right');

    // Kontrol Klik
    let isTurningLeft = false;
    let isTurningRight = false;
    let isShooting = false;

    leftArea.addEventListener('mousedown', () => isTurningLeft = true);
    leftArea.addEventListener('mouseup', () => isTurningLeft = false);
    leftArea.addEventListener('touchstart', () => isTurningLeft = true);
    leftArea.addEventListener('touchend', () => isTurningLeft = false);

    rightArea.addEventListener('mousedown', () => isShooting = true);
    rightArea.addEventListener('mouseup', () => isShooting = false);
    rightArea.addEventListener('touchstart', () => isShooting = true);
    rightArea.addEventListener('touchend', () => isShooting = false);

    function shoot() {
      bullets.push({life: 25});
      particles.push({life: 6, type: 'flash'});
    }

    function spawnEnemy() {
      enemies.push({
        dist: 900 + Math.random() * 400,
        side: Math.random() * 200 - 100,
        health: 3
      });
    }

    function update() {
      if (gameOver) return;

      // Gerak putar
      if (isTurningLeft) player.angle -= 3.5;
      if (isTurningRight) player.angle += 3.5;  // (untuk cadangan)

      // Tembak
      if (isShooting && Math.random() < 0.5) shoot();

      // Update peluru
      for (let i = bullets.length - 1; i >= 0; i--) {
        if (--bullets[i].life <= 0) bullets.splice(i, 1);
      }

      // Update musuh
      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.dist -= 3.5;

        if (e.dist < 120) {
          player.health -= 25;
          enemies.splice(i, 1);
          if (player.health <= 0) gameOver = true;
        }
      }

      if (Math.random() < 0.06) spawnEnemy();

      document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
      document.getElementById('score').textContent = player.score;
    }

    function draw() {
      // Langit & Tanah
      ctx.fillStyle = '#0a1a30';
      ctx.fillRect(0, 0, w, h/2);
      ctx.fillStyle = '#1f2a10';
      ctx.fillRect(0, h/2, w, h/2);

      // Musuh
      for (let e of enemies) {
        let scale = 1000 / e.dist;
        let x = w/2 + e.side * scale * 0.8;
        let sizeW = 110 * scale;
        let sizeH = 190 * scale;

        ctx.fillStyle = '#6b2525';
        ctx.fillRect(x - sizeW/2, h/2 - sizeH/2, sizeW, sizeH);
        ctx.fillStyle = '#3a1f1f';
        ctx.fillRect(x - sizeW/3.5, h/2 - sizeH/2 - 35, sizeW*0.55, sizeH*0.4);
      }

      // Senjata
      ctx.fillStyle = '#222';
      ctx.fillRect(w/2 - 40, h - 180, 80, 250);

      // Muzzle Flash
      for (let p of particles) {
        if (p.type === 'flash' && p.life > 0) {
          ctx.fillStyle = `rgba(255,240,80,${p.life/7})`;
          ctx.fillRect(w/2 - 35, h - 210, 70, 90);
        }
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.9)';
        ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 70px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', w/2, h/2);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
