<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Video Gallery</title>
    <style>
        /* CSS LANGSUNG DI DALAM HTML AGAR PRAKTIS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .gallery-container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        .neon-text {
            font-size: 3rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe, 0 0 40px #bc13fe;
        }

        .neon-text span {
            color: #bc13fe;
        }

        /* Layout 2 Kolom */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-card {
            position: relative;
            height: 450px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #33105d;
            transition: all 0.4s ease;
        }

        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
            transition: 0.4s;
        }

        .overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 5px 12px;
            border-left: 3px solid #bc13fe;
            background: rgba(0, 0, 0, 0.6);
            text-align: left;
        }

        .overlay p {
            font-size: 0.8rem;
            color: #bc13fe;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* Efek Hover */
        .video-card:hover {
            transform: translateY(-10px);
            border-color: #bc13fe;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.6);
        }

        .video-card:hover video {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        /* Responsif HP */
        @media (max-width: 768px) {
            .neon-text { font-size: 2rem; }
            .video-card { height: 350px; }
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <h1 class="neon-text">Neon <span>Motion</span></h1>
        
        <div class="grid-wrapper">
            
            <div class="video-card">
                <video autoplay muted loop playsinline>
                    <source src="video1.mp4" type="video/mp4">
                    Browser tidak mendukung video.
                </video>
                <div class="overlay">
                    <p>SYSTEM_01: ONLINE</p>
                </div>
            </div>

            <div class="video-card">
                <video autoplay muted loop playsinline>
                    <source src="video2.mp4" type="video/mp4">
                    Browser tidak mendukung video.
                </video>
                <div class="overlay">
                    <p>SYSTEM_02: ONLINE</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
