<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Double Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">
        <h1 class="neon-text">Neon <span>Motion</span></h1>
        
        <div class="grid-wrapper">
            
            <div class="video-card">
                <video autoplay muted loop playsinline>
                    <source src="https://streamable.com/e/n0moy9?autoplay=1&muted=1" type="video/mp4">
                    <source src="https://cdn-cf-east.streamable.com/video/mp4/n0moy9.mp4" type="video/mp4">
                    Browser tidak mendukung video.
                </video>
                <div class="overlay">
                    <p>FEED_01: ACTIVE</p>
                </div>
            </div>

            <div class="video-card">
                <video autoplay muted loop playsinline>
                    <source src="https://streamable.com/e/c8ki86?autoplay=1&muted=1" type="video/mp4">
                    <source src="https://cdn-cf-east.streamable.com/video/mp4/c8ki86.mp4" type="video/mp4">
                    Browser tidak mendukung video.
                </video>
                <div class="overlay">
                    <p>FEED_02: ACTIVE</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
