<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Perang POV</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:none; }
    canvas { display:block; }
    .hud { position:absolute; top:10px; left:10px; color:#0f0; font-size:18px; text-shadow:0 0 8px black; z-index:10; }
    .crosshair { position:absolute; top:50%; left:50%; color:lime; font-size:32px; transform:translate(-50%,-50%); pointer-events:none; z-index:5; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">NYAWA: <span id="health">100</span> | SKOR: <span id="score">0</span></div>
  <div class="crosshair">+</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    window.addEventListener('resize', ()=>{ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; });

    let player = { health: 100, score: 0, angle: 0 };
    let bullets = [], enemies = [], particles = [], gameOver = false;
    let isMobile = /Android|iPhone/i.test(navigator.userAgent);

    canvas.addEventListener('click', () => shoot());

    function shoot() {
      if (gameOver) return;
      bullets.push({life: 30});
      particles.push({life:6, type:'flash'});
    }

    function spawnEnemy() {
      enemies.push({ dist: 700 + Math.random()*500, side: Math.random()*160 - 80, health: 3 });
    }

    function update() {
      if (gameOver) return;
      bullets = bullets.filter(b => --b.life > 0);
      
      for (let i = enemies.length-1; i >= 0; i--) {
        let e = enemies[i];
        e.dist -= 3;
        if (e.dist < 90) { player.health -= 25; enemies.splice(i,1); }
        if (player.health <= 0) gameOver = true;
      }

      if (Math.random() < 0.05) spawnEnemy();

      document.getElementById('health').textContent = Math.max(0, player.health);
      document.getElementById('score').textContent = player.score;
    }

    function draw() {
      ctx.fillStyle = '#0a1a2a'; ctx.fillRect(0,0,w,h/2);
      ctx.fillStyle = '#112200'; ctx.fillRect(0,h/2,w,h/2);

      for (let e of enemies) {
        let scale = 850 / e.dist;
        let x = w/2 + e.side * scale * 0.9;
        ctx.fillStyle = '#6b1e1e';
        ctx.fillRect(x - 45*scale, h/2 - 80*scale, 90*scale, 160*scale);
      }

      ctx.fillStyle = '#222';
      ctx.fillRect(w/2 - 35, h - 160, 70, 200);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.9)';
        ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', w/2, h/2);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
